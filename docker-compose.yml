version: '3.8'
services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: backend_development
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: bash -c "bundle install && rails db:create db:migrate && rails s -b 0.0.0.0"
    volumes:
      - ./backend:/myapp
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  db_data: